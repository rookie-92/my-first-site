<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 540px;
      animation: rise 0.8s ease-out;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      line-height: 1.05;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #fff, #8ec5ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { font-size: 1.2rem; opacity: 0.85; line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1.1rem;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      font-size: 0.85rem;
      opacity: 0.7;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>It's live!</h1>
    <p>This is my first website on the internet. More coming soon.</p>
    <span class="badge">Built with Cowork ✦ Published by me</span>
  </div>
</body>
</html>
